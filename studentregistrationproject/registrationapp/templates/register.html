

<!DOCTYPE html>
<html>
<head>

    <title>Student Registration Form</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container{
            width: 60%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1{
            text-align: center;
            color: darkblue;
        }

        input[type=text],
        input[type=email],
        input[type=date],
        textarea,
        select,
        input[type=file]{

            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .submit-btn{
            background-color: darkblue;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            font-size: 18px;
        }

        .success{
            color: green;
            text-align: center;
            font-size: 20px;
        }

        .errorlist{
            color: red;
        }

        label{
            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Student Registration Form</h1>

{% if success %}

<p class="success">
    Registration Successful!
</p>

{% endif %}

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="submit-btn">
        Submit
    </button>

</form>

</div>

</body>
</html>
